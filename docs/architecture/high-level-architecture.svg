<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="660" viewBox="0 0 1400 660" role="img" aria-labelledby="title desc">
  <title id="title">Personal Banking Analytics - High-Level Architecture</title>
  <desc id="desc">Data flows from local bank files through Meltano extractors into JSONL and BigQuery bronze, then dbt silver and gold, and finally quality scripts and analytics consumption.</desc>

  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 500 14px Arial, sans-serif; fill: #4b5563; }
      .box { stroke: #334155; stroke-width: 2; rx: 10; ry: 10; }
      .label { font: 600 15px Arial, sans-serif; fill: #111827; }
      .small { font: 500 12px Arial, sans-serif; fill: #1f2937; }
      .arrow { stroke: #1e293b; stroke-width: 2.5; fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b" />
    </marker>
  </defs>

  <text x="42" y="48" class="title">Personal Banking Analytics - High-Level Architecture</text>
  <text x="42" y="74" class="subtitle">Meltano ingestion -> BigQuery bronze -> dbt silver/gold -> quality and analytics</text>

  <rect class="box" fill="#e0f2fe" x="40" y="130" width="220" height="90" />
  <text class="label" x="58" y="163">Local CSV/XLS Files</text>
  <text class="small" x="58" y="186">Itau, Scotia, BBVA</text>

  <rect class="box" fill="#fef3c7" x="320" y="130" width="250" height="90" />
  <text class="label" x="338" y="163">Meltano Extractors</text>
  <text class="small" x="338" y="186">tap-itau, tap-scotia, tap-bbva</text>

  <rect class="box" fill="#dcfce7" x="640" y="70" width="250" height="90" />
  <text class="label" x="658" y="103">target-jsonl</text>
  <text class="small" x="658" y="126">Local output validation</text>

  <rect class="box" fill="#dbeafe" x="640" y="190" width="250" height="90" />
  <text class="label" x="658" y="223">target-bigquery</text>
  <text class="small" x="658" y="246">BigQuery bronze load</text>

  <rect class="box" fill="#ede9fe" x="960" y="190" width="260" height="90" />
  <text class="label" x="978" y="223">BigQuery Bronze</text>
  <text class="small" x="978" y="246">Raw source data by bank</text>

  <rect class="box" fill="#fce7f3" x="960" y="320" width="260" height="90" />
  <text class="label" x="978" y="353">dbt Silver</text>
  <text class="small" x="978" y="376">Standardization and classification</text>

  <rect class="box" fill="#fee2e2" x="960" y="450" width="260" height="90" />
  <text class="label" x="978" y="483">dbt Gold</text>
  <text class="small" x="978" y="506">Facts and monthly aggregates</text>

  <rect class="box" fill="#ecfccb" x="1260" y="390" width="110" height="80" />
  <text class="label" x="1275" y="422">quality</text>
  <text class="small" x="1275" y="442">scripts</text>
  <text class="small" x="1275" y="458">01-08</text>

  <rect class="box" fill="#cffafe" x="1260" y="500" width="110" height="80" />
  <text class="label" x="1275" y="532">Analytics</text>
  <text class="small" x="1275" y="552">reports and BI</text>

  <line class="arrow" x1="260" y1="175" x2="320" y2="175" marker-end="url(#arrowhead)" />
  <line class="arrow" x1="570" y1="165" x2="640" y2="115" marker-end="url(#arrowhead)" />
  <line class="arrow" x1="570" y1="185" x2="640" y2="235" marker-end="url(#arrowhead)" />
  <line class="arrow" x1="890" y1="235" x2="960" y2="235" marker-end="url(#arrowhead)" />
  <line class="arrow" x1="1090" y1="280" x2="1090" y2="320" marker-end="url(#arrowhead)" />
  <line class="arrow" x1="1090" y1="410" x2="1090" y2="450" marker-end="url(#arrowhead)" />
  <line class="arrow" x1="1220" y1="490" x2="1260" y2="430" marker-end="url(#arrowhead)" />
  <line class="arrow" x1="1220" y1="500" x2="1260" y2="540" marker-end="url(#arrowhead)" />
</svg>
